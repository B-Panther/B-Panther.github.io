<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EgMail - Coming Soon | Temporary Email Service</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: hidden;
            position: relative;
        }

        /* Animated Background */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }

        .circle {
            position: absolute;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50%;
            animation: float 20s infinite ease-in-out;
        }

        .circle:nth-child(1) {
            width: 300px;
            height: 300px;
            top: -100px;
            left: -100px;
            animation-delay: 0s;
        }

        .circle:nth-child(2) {
            width: 500px;
            height: 500px;
            bottom: -200px;
            right: -200px;
            animation-delay: 5s;
        }

        .circle:nth-child(3) {
            width: 200px;
            height: 200px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: 10s;
        }

        .circle:nth-child(4) {
            width: 150px;
            height: 150px;
            top: 20%;
            right: 10%;
            animation-delay: 3s;
        }

        .circle:nth-child(5) {
            width: 250px;
            height: 250px;
            bottom: 10%;
            left: 5%;
            animation-delay: 7s;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0) rotate(0deg);
            }
            50% {
                transform: translateY(-30px) rotate(10deg);
            }
        }

        /* Particle effect */
        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 50%;
            animation: particleFloat 15s infinite linear;
        }

        @keyframes particleFloat {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) rotate(360deg);
                opacity: 0;
            }
        }

        /* Main Content */
        .container {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .content {
            text-align: center;
            max-width: 800px;
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 50px 40px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.2), inset 0 1px 2px rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            animation: fadeInUp 1s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            font-size: 70px;
            margin-bottom: 20px;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-10px);
            }
        }

        h1 {
            font-size: 4rem;
            background: linear-gradient(135deg, #fff, #a8c0ff, #3f2b63);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }

        .tagline {
            font-size: 1.5rem;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 15px;
            font-weight: 300;
        }

        .description {
            color: rgba(255, 255, 255, 0.7);
            font-size: 1.1rem;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .features {
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
            margin: 40px 0;
        }

        .feature {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px 25px;
            border-radius: 50px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
            animation: slideIn 0.8s ease-out;
        }

        .feature:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.2);
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.2);
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .feature span {
            font-size: 1.8rem;
            display: block;
            margin-bottom: 5px;
        }

        .feature p {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.9);
        }

        .countdown {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 40px 0;
            flex-wrap: wrap;
        }

        .time-box {
            background: rgba(0, 0, 0, 0.4);
            padding: 20px;
            border-radius: 15px;
            min-width: 100px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
        }

        .time-box:hover {
            transform: scale(1.05);
            background: rgba(0, 0, 0, 0.6);
        }

        .time-number {
            font-size: 2.5rem;
            font-weight: bold;
            color: #fff;
            display: block;
        }

        .time-label {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.7);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .notify-form {
            margin-top: 30px;
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .email-input {
            padding: 15px 25px;
            border: none;
            border-radius: 50px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(5px);
            color: white;
            font-size: 1rem;
            width: 280px;
            outline: none;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .email-input::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        .email-input:focus {
            background: rgba(255, 255, 255, 0.25);
            border-color: rgba(255, 255, 255, 0.5);
        }

        .notify-btn {
            padding: 15px 35px;
            border: none;
            border-radius: 50px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .notify-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s;
        }

        .notify-btn:hover::before {
            left: 100%;
        }

        .notify-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
        }

        .social-links {
            margin-top: 40px;
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .social-icon {
            width: 45px;
            height: 45px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            color: white;
        }

        .social-icon:hover {
            transform: translateY(-3px);
            background: rgba(255, 255, 255, 0.3);
        }

        .footer {
            margin-top: 40px;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.5);
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2.5rem;
            }
            
            .tagline {
                font-size: 1.2rem;
            }
            
            .content {
                padding: 30px 20px;
            }
            
            .time-box {
                min-width: 70px;
                padding: 15px;
            }
            
            .time-number {
                font-size: 1.8rem;
            }
        }

        /* Loading animation for button */
        .loading {
            opacity: 0.7;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div class="bg-animation">
        <div class="circle"></div>
        <div class="circle"></div>
        <div class="circle"></div>
        <div class="circle"></div>
        <div class="circle"></div>
    </div>

    <div class="container">
        <div class="content">
            <div class="logo">📧✨</div>
            <h1>EgMail</h1>
            <div class="tagline">Temporary Email Service</div>
            <div class="description">
                Free • Anonymous • Unlimited • Instant
            </div>
            
            <div class="features">
                <div class="feature">
                    <span>🚀</span>
                    <p>Instant Setup</p>
                </div>
                <div class="feature">
                    <span>🔒</span>
                    <p>100% Private</p>
                </div>
                <div class="feature">
                    <span>♾️</span>
                    <p>Unlimited</p>
                </div>
                <div class="feature">
                    <span>⚡</span>
                    <p>Real-time</p>
                </div>
            </div>

            <div class="countdown">
                <div class="time-box">
                    <span class="time-number" id="days">00</span>
                    <span class="time-label">Days</span>
                </div>
                <div class="time-box">
                    <span class="time-number" id="hours">00</span>
                    <span class="time-label">Hours</span>
                </div>
                <div class="time-box">
                    <span class="time-number" id="minutes">00</span>
                    <span class="time-label">Minutes</span>
                </div>
                <div class="time-box">
                    <span class="time-number" id="seconds">00</span>
                    <span class="time-label">Seconds</span>
                </div>
            </div>

            <div class="notify-form">
                <input type="email" class="email-input" id="emailInput" placeholder="Enter your email for early access">
                <button class="notify-btn" id="notifyBtn">Notify Me 🎉</button>
            </div>
            <div id="message" style="margin-top: 15px; font-size: 0.9rem; color: #a8c0ff;"></div>

            <div class="social-links">
                <a href="#" class="social-icon">🐙</a>
                <a href="#" class="social-icon">🐦</a>
                <a href="#" class="social-icon">💬</a>
                <a href="#" class="social-icon">📘</a>
            </div>

            <div class="footer">
                <p>🚧 Coming Soon • Stay Tuned! 🚧</p>
                <p style="margin-top: 10px;">© 2026 EgMail - Your Privacy First Temporary Email Service</p>
            </div>
        </div>
    </div>

    <script>
        // Countdown Timer (Set to 14 days from now - adjust as needed)
        function getNextLaunchDate() {
            let launchDate = new Date();
            launchDate.setDate(launchDate.getDate() + 14);
            launchDate.setHours(0, 0, 0, 0);
            return launchDate;
        }

        let targetDate = getNextLaunchDate();

        function updateCountdown() {
            const now = new Date().getTime();
            const distance = targetDate - now;

            if (distance < 0) {
                targetDate = getNextLaunchDate();
                updateCountdown();
                return;
            }

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById('days').textContent = days.toString().padStart(2, '0');
            document.getElementById('hours').textContent = hours.toString().padStart(2, '0');
            document.getElementById('minutes').textContent = minutes.toString().padStart(2, '0');
            document.getElementById('seconds').textContent = seconds.toString().padStart(2, '0');
        }

        setInterval(updateCountdown, 1000);
        updateCountdown();

        // Create particles
        function createParticles() {
            const bgAnimation = document.querySelector('.bg-animation');
            for (let i = 0; i < 100; i++) {
                const particle = document.createElement('div');
                particle.classList.add('particle');
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 15 + 's';
                particle.style.animationDuration = 10 + Math.random() * 10 + 's';
                bgAnimation.appendChild(particle);
            }
        }
        createParticles();

        // Notify button functionality
        const notifyBtn = document.getElementById('notifyBtn');
        const emailInput = document.getElementById('emailInput');
        const messageDiv = document.getElementById('message');

        notifyBtn.addEventListener('click', function() {
            const email = emailInput.value.trim();
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            
            if (!email) {
                showMessage('Please enter your email address', 'error');
                return;
            }
            
            if (!emailRegex.test(email)) {
                showMessage('Please enter a valid email address', 'error');
                return;
            }

            // Show loading state
            const originalText = notifyBtn.textContent;
            notifyBtn.textContent = 'Sending...';
            notifyBtn.classList.add('loading');
            notifyBtn.disabled = true;

            // Simulate API call (replace with actual backend)
            setTimeout(() => {
                showMessage('🎉 Thanks! We\'ll notify you when EgMail launches!', 'success');
                emailInput.value = '';
                notifyBtn.textContent = originalText;
                notifyBtn.classList.remove('loading');
                notifyBtn.disabled = false;
                
                // Store in localStorage
                const subscribers = JSON.parse(localStorage.getItem('egmail_subscribers') || '[]');
                if (!subscribers.includes(email)) {
                    subscribers.push(email);
                    localStorage.setItem('egmail_subscribers', JSON.stringify(subscribers));
                }
            }, 1000);
        });

        function showMessage(msg, type) {
            messageDiv.textContent = msg;
            messageDiv.style.color = type === 'success' ? '#4caf50' : '#ff6b6b';
            setTimeout(() => {
                messageDiv.textContent = '';
            }, 5000);
        }

        // Animate features on scroll
        const observerOptions = {
            threshold: 0.1,
            rootMargin: '0px 0px -50px 0px'
        };

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.style.animation = 'slideIn 0.8s ease-out forwards';
                    observer.unobserve(entry.target);
                }
            });
        }, observerOptions);

        document.querySelectorAll('.feature').forEach(feature => {
            feature.style.opacity = '0';
            feature.style.animation = 'none';
            observer.observe(feature);
        });

        // Add hover effect to time boxes
        document.querySelectorAll('.time-box').forEach(box => {
            box.addEventListener('mouseenter', () => {
                box.style.transform = 'scale(1.05)';
            });
            box.addEventListener('mouseleave', () => {
                box.style.transform = 'scale(1)';
            });
        });
    </script>
</body>
</html>
